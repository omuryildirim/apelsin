# Deploy Cloudflare Workers (frontend, API proxy, media proxy)
#
# To use this workflow:
# 1. Configure these repository variables (Settings > Secrets and variables > Actions):
#    - VITE_API_BASE_URL: https://your-api-worker.your-domain.com
#    - VITE_WS_URL: wss://your-ws-domain.com
#    - VITE_MEDIA_URL: https://your-media-worker.your-domain.com
#    - VAPID_PUBLIC_KEY: your VAPID public key
#    - API_ORIGIN_HOST_NAME: https://your-aws-api-gateway-url.execute-api.region.amazonaws.com
#    - MEDIA_ORIGIN_HOST_NAME: https://your-aws-media-api-gateway-url.execute-api.region.amazonaws.com
# 2. Configure these repository secrets:
#    - CLOUDFLARE_API_TOKEN: your Cloudflare API token with Workers permissions
#    - ORIGIN_SECRET: shared secret between Cloudflare Workers and Lambda (optional)

name: Deploy Workers

on:
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      fe: ${{ steps.filter.outputs.fe }}
      api: ${{ steps.filter.outputs.api }}
      media: ${{ steps.filter.outputs.media }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            fe:
              - 'cloudflare/apelsin-fe/**'
            api:
              - 'cloudflare/apelsin-api/**'
            media:
              - 'cloudflare/apelsin-media/**'

  deploy-apelsin-fe-worker:
    needs: changes
    if: needs.changes.outputs.fe == 'true'
    runs-on: ubuntu-latest
    name: Deploy apelsin-fe Worker
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.0
      - run: pnpm install --frozen-lockfile
        shell: bash
        working-directory: ./cloudflare/apelsin-fe
      - run: pnpm build
        shell: bash
        working-directory: ./cloudflare/apelsin-fe
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}
          VITE_MEDIA_URL: ${{ vars.VITE_MEDIA_URL }}
          VITE_VAPID_PUBLIC_KEY: ${{ vars.VAPID_PUBLIC_KEY }}
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "cloudflare/apelsin-fe"

  deploy-apelsin-api-worker:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    name: Deploy apelsin-api Worker
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.0
      - run: pnpm install --frozen-lockfile
        shell: bash
        working-directory: ./cloudflare/apelsin-api
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "cloudflare/apelsin-api"
          command: deploy --var ORIGIN_HOST_NAME:${{ vars.API_ORIGIN_HOST_NAME }}
          secrets: |
            ORIGIN_SECRET
        env:
          ORIGIN_SECRET: ${{ secrets.ORIGIN_SECRET }}

  deploy-apelsin-media-worker:
    needs: changes
    if: needs.changes.outputs.media == 'true'
    runs-on: ubuntu-latest
    name: Deploy apelsin-media Worker
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.0
      - run: pnpm install --frozen-lockfile
        shell: bash
        working-directory: ./cloudflare/apelsin-media
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "cloudflare/apelsin-media"
          command: deploy --var ORIGIN_HOST_NAME:${{ vars.MEDIA_ORIGIN_HOST_NAME }}
          secrets: |
            ORIGIN_SECRET
        env:
          ORIGIN_SECRET: ${{ secrets.ORIGIN_SECRET }}
